version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: fleet-management-system-db
    restart: always
    environment:
      POSTGRES_USER: agrostoc
      POSTGRES_PASSWORD: agrostoc
      POSTGRES_DB: agrostoc_fms
    ports:
      - "54323:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: